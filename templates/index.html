{% extends "base.html" %}

{% block content %}
    <h1>Users</h1>

    <ul>
        {% for user in users %}
            <li>
                <a href="{{ url_for('user_movies', user_id=user.id) }}">
                    {{ user.name }}
                </a>
            </li>
        {% endfor %}
    </ul>

    <h2>Add new user</h2>

    <form action="{{ url_for('create_user') }}" method="post">
        <input type="text" name="name" placeholder="Enter user name" required>
        <button type="submit">Add User</button>
    </form>
{% endblock %}
